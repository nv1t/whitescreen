<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Light</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      height: 100dvh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-family: system-ui, sans-serif;
      transition: background 0.3s ease;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      margin-bottom: 24px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    body.hide-ui #controls { opacity: 0; pointer-events: none; }

    label { color: #fff; font-size: 13px; user-select: none; }

    /* Preset colour swatches */
    #presets { display: flex; gap: 8px; flex-wrap: wrap; }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover, .swatch.active { transform: scale(1.2); border-color: #fff; }

    /* Custom colour picker */
    #colorPicker {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: none;
    }
    #colorPicker::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
    #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

    /* Hex text input */
    #hexInput {
      width: 80px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    #hexInput:focus { border-color: #fff; }
    #hexInput.invalid { border-color: #ff4444; }

    /* Brightness slider */
    #brightness {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.3);
      outline: none;
      cursor: pointer;
    }
    #brightness::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    /* Fullscreen button */
    #fsBtn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #fsBtn:hover { background: rgba(255,255,255,0.35); }

    /* Floating toggle button */
    #toggleBtn {
      position: fixed;
      bottom: 14px;
      left: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
      z-index: 10;
    }
    #toggleBtn:hover { background: rgba(0,0,0,0.6); color: #fff; }
    /* always visible — never hidden */

    /* Ko-fi link */
    #kofi {
      position: fixed;
      bottom: 14px;
      right: 16px;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      text-decoration: none;
      background: rgba(0,0,0,0.35);
      padding: 5px 10px;
      border-radius: 8px;
      transition: opacity 0.4s ease, color 0.2s;
    }
    #kofi:hover { color: #fff; }

    /* Hide-UI hint */
    #hint {
      position: fixed;
      top: 12px;
      right: 14px;
      color: rgba(0,0,0,0.3);
      font-size: 11px;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.4s ease;
    }
    body.hide-ui #hint { opacity: 0; }  </style>
</head>
<body>

  <button id="toggleBtn" title="Show / hide controls">🎨</button>

  <span id="hint">Press <kbd>H</kbd> to hide controls · double-click background</span>

  <a id="kofi" href="https://ko-fi.com/nuitg" target="_blank" rel="noopener">☕ Ko-fi</a>

  <div id="controls">
    <label>Colour</label>

    <div id="presets">
      <!-- swatches injected by JS -->
    </div>

    <label>Custom</label>
    <input type="color" id="colorPicker" title="Pick a colour" value="#ffffff" />
    <input type="text" id="hexInput" value="#ffffff" maxlength="7" spellcheck="false" title="Hex colour code" />

    <label>Brightness</label>
    <input type="range" id="brightness" min="1" max="100" value="100" title="Brightness" />

    <button id="fsBtn">⛶ Fullscreen</button>
  </div>

  <script>
    const presets = [
      { label: 'White',       hex: '#ffffff' },
      { label: 'Warm white',  hex: '#ffe8c0' },
      { label: 'Soft yellow', hex: '#ffee88' },
      { label: 'Orange',      hex: '#ff8800' },
      { label: 'Red',         hex: '#ff2222' },
      { label: 'Green',       hex: '#22ff44' },
      { label: 'Cyan',        hex: '#00eeff' },
      { label: 'Blue',        hex: '#2244ff' },
      { label: 'Purple',      hex: '#aa22ff' },
      { label: 'Pink',        hex: '#ff44aa' },
      { label: 'Black',       hex: '#000000' },
    ];

    let currentHex = '#ffffff';
    let currentBrightness = 100;

    const presetsEl   = document.getElementById('presets');
    const picker      = document.getElementById('colorPicker');
    const hexInput    = document.getElementById('hexInput');
    const brightness  = document.getElementById('brightness');
    const fsBtn       = document.getElementById('fsBtn');
    const toggleBtn   = document.getElementById('toggleBtn');

    function setUiVisible(visible) {
      document.body.classList.toggle('hide-ui', !visible);
      toggleBtn.textContent = visible ? '✕' : '🎨';
      toggleBtn.title = visible ? 'Hide controls' : 'Show controls';
    }

    toggleBtn.addEventListener('click', () => {
      setUiVisible(document.body.classList.contains('hide-ui'));
    });

    // Build swatches
    presets.forEach(p => {
      const el = document.createElement('div');
      el.className = 'swatch' + (p.hex === '#ffffff' ? ' active' : '');
      el.style.background = p.hex;
      el.title = p.label;
      el.addEventListener('click', () => setColour(p.hex, el));
      presetsEl.appendChild(el);
    });

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return { r, g, b };
    }

    function applyBackground() {
      const f = currentBrightness / 100;
      const { r, g, b } = hexToRgb(currentHex);
      document.body.style.background =
        `rgb(${Math.round(r*f)}, ${Math.round(g*f)}, ${Math.round(b*f)})`;
    }

    function setColour(hex, activeEl) {
      currentHex = hex;
      picker.value = hex;
      hexInput.value = hex;
      hexInput.classList.remove('invalid');
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      if (activeEl) activeEl.classList.add('active');
      applyBackground();
    }

    picker.addEventListener('input', () => {
      currentHex = picker.value;
      hexInput.value = picker.value;
      hexInput.classList.remove('invalid');
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      applyBackground();
    });

    hexInput.addEventListener('input', () => {
      let val = hexInput.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        hexInput.classList.remove('invalid');
        currentHex = val;
        picker.value = val;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        applyBackground();
      } else {
        hexInput.classList.add('invalid');
      }
    });

    brightness.addEventListener('input', () => {
      currentBrightness = Number(brightness.value);
      applyBackground();
    });

    // Fullscreen — auto-hide UI on enter, restore on exit
    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      fsBtn.textContent = isFs ? '✕ Exit fullscreen' : '⛶ Fullscreen';
      setUiVisible(!isFs);
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    // Hide/show UI with H key or double-click
    document.addEventListener('keydown', e => {
      if (e.key === 'h' || e.key === 'H') setUiVisible(document.body.classList.contains('hide-ui'));
    });
    document.body.addEventListener('dblclick', e => {
      if (!e.target.closest('#controls') && !e.target.closest('#toggleBtn'))
        setUiVisible(document.body.classList.contains('hide-ui'));
    });
  </script>
</body>
</html>
